<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mark Fromow - Fashion Design Services</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background-color: #fff;
      font-family: 'Avenir Next Medium', 'Avenir Next', sans-serif;
      font-weight: 500;
      position: relative;
    }

    #wip-link {
      display: block;
      z-index: 100;
      font-family: 'Avenir Next', sans-serif;
      font-weight: 400;
      font-size: 20pt;
      line-height: 1;
      color: #0000EE;
      text-decoration: none;
      letter-spacing: 0.05em;
      white-space: nowrap;
      pointer-events: auto;
      text-align: center;
    }
    #wip-link:visited { color: #551A8B; }

    #wip-container {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      gap: 0;
    }

    #instagram-label {
      display: block;
      font-family: 'Avenir Next', sans-serif;
      font-weight: 400;
      font-size: 5pt;
      letter-spacing: 0.05em;
      white-space: nowrap;
      line-height: 1;
      margin-top: 2px;
    }

    #email-label {
      position: fixed;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      font-family: 'Avenir Next', sans-serif;
      font-weight: 400;
      font-size: 20pt;
      line-height: 30pt;
      color: #0000EE;
      letter-spacing: 0.05em;
      white-space: nowrap;
      pointer-events: none;
    }

    #ticker-container {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    .ticker-row {
      position: absolute;
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
    }

    .ticker-content {
      display: inline-block;
      animation: scroll-left linear infinite;
    }

    @keyframes scroll-left {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>
<body>

  <div id="wip-container">
    <a id="wip-link" href="https://instagram.com/wip_pit" target="_blank" rel="noopener">WIP<span id="instagram-label">(INSTAGRAM)</span></a>
  </div>
  <div id="email-label">CONTACT</div>
  <div id="ticker-container"></div>

  <script>
    window.addEventListener('load', () => {
      const container = document.getElementById('ticker-container');
      const vw = window.innerWidth;

      const row1FontPx = Math.max(12, vw * 0.022);
      const row2FontPx = Math.max(16, vw * 0.030);

      const row1LinePx = row1FontPx * 2.0;
      const row2LinePx = row2FontPx * 2.0;

      const innerGap = row2FontPx * 2.25;

      const outerGap = row2LinePx * 3.0 - row2FontPx * 1.75;

      const rowDefs = [
        {
          cls: 'row1',
          text: 'MARK FROMOW',
          fontPx: row1FontPx,
          linePx: row1LinePx,
          fontFamily: "'Avenir Next Medium', sans-serif",
          fontWeight: '500',
          wordGap: '20ch',
          duration: 140,
        },
        {
          cls: 'row2',
          text: 'FASHION DESIGN SERVICES \u2022 SERVICES DE CR\u00C9ATION DE MODE',
          fontPx: row2FontPx,
          linePx: row2LinePx,
          fontFamily: "'Avenir Next', sans-serif",
          fontWeight: '400',
          wordGap: '3ch',
          duration: 105,
        },
      ];

      rowDefs[0].topPx = 0;
      rowDefs[1].topPx = row1LinePx + innerGap;
      const cycleHeightPx = rowDefs[1].topPx + row2LinePx + outerGap;

      function buildSet(yOffsetPx) {
        rowDefs.forEach(def => {
          const row = document.createElement('div');
          row.className = `ticker-row ${def.cls}`;
          row.style.cssText = `
            top: ${def.topPx + yOffsetPx}px;
            font-size: ${def.fontPx}px;
            line-height: ${def.linePx}px;
            font-family: ${def.fontFamily};
            font-weight: ${def.fontWeight};
          `;
          const content = document.createElement('div');
          content.className = 'ticker-content';
          content.style.animationDuration = `${def.duration}s`;
          const span = document.createElement('span');
          span.style.paddingRight = def.wordGap;
          span.textContent = def.text;
          content.appendChild(span);
          row.appendChild(content);
          container.appendChild(row);
          while (content.scrollWidth < vw * 2) {
            const s = document.createElement('span');
            s.style.paddingRight = def.wordGap;
            s.textContent = def.text;
            content.appendChild(s);
          }
          content.innerHTML += content.innerHTML;
        });
      }

      // WIP: nudge further down on mobile (smaller screens need more offset)
      const wipNudge = vw < 600 ? row1LinePx * 1.2 : row1LinePx * 0.6 + 10;
      document.getElementById('wip-container').style.top = `${wipNudge}px`;

      // EMAIL: centre of the outerGap in the second visible cycle
      const emailTop = cycleHeightPx + rowDefs[1].topPx + row2LinePx + outerGap / 2;
      document.getElementById('email-label').style.top = `${emailTop}px`;

      const sets = Math.ceil(window.innerHeight / cycleHeightPx) + 1;
      for (let i = 0; i < sets; i++) buildSet(i * cycleHeightPx);

      // Single centred email square
      const SQ = vw < 600 ? Math.round(170 * 0.67 * 1.75) : Math.round(170 * 1.75);
      const sqFontPt = vw < 600 ? '9.5pt' : '14pt';
      let overlayVisible = false;
      let emailSquare = null;

      function showEmailSquare() {
        const W = window.innerWidth;
        const H = window.innerHeight;

        emailSquare = document.createElement('div');
        emailSquare.style.cssText = `
          position: fixed;
          left: ${(W - SQ) / 2}px;
          top: ${(H - SQ) / 2}px;
          width: ${SQ}px;
          height: ${SQ}px;
          background: #fff;
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 120;
          box-sizing: border-box;
          padding: 8px;
        `;

        const link = document.createElement('a');
        link.href = 'mailto:MARK@MARKFROMOW.COM';
        link.style.cssText = `
          font-family: 'Avenir Next', sans-serif;
          font-size: ${sqFontPt};
          color: #0000EE;
          text-align: center;
          text-decoration: none;
          line-height: 1.3;
          word-break: break-all;
          cursor: pointer;
        `;
        link.textContent = 'MARK@MARKFROMOW.COM';
        emailSquare.appendChild(link);
        document.body.appendChild(emailSquare);
      }

      document.body.addEventListener('click', (e) => {
        if (e.target.closest('#wip-link')) return;
        if (e.target.closest('a[href^="mailto"]')) return;
        overlayVisible = !overlayVisible;
        if (overlayVisible) {
          showEmailSquare();
        } else {
          if (emailSquare) { emailSquare.remove(); emailSquare = null; }
        }
      });
    });
  </script>
</body>
</html>
