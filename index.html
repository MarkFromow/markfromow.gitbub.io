<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mark Fromow - Fashion Design Services</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background-color: #fff;
      font-family: 'Avenir Next Medium', 'Avenir Next', sans-serif;
      font-weight: 500;
      position: relative;
    }

    #wip-link {
      display: block;
      z-index: 100;
      font-family: 'Avenir Next', sans-serif;
      font-weight: 400;
      font-size: 20pt;
      line-height: 1;
      color: #0000EE;
      text-decoration: none;
      letter-spacing: 0.05em;
      white-space: nowrap;
      pointer-events: auto;
      text-align: center;
    }
    #wip-link:visited { color: #551A8B; }

    #wip-container {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      gap: 0;
    }

    #instagram-label {
      display: block;
      font-family: 'Avenir Next', sans-serif;
      font-weight: 400;
      font-size: 5pt;
      letter-spacing: 0.05em;
      white-space: nowrap;
      line-height: 1;
      margin-top: 2px;
    }

    #email-label {
      position: fixed;
      top: calc(50% + 10px);
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      font-family: 'Avenir Next', sans-serif;
      font-weight: 400;
      font-size: 20pt;
      line-height: 30pt;
      color: #0000EE;
      letter-spacing: 0.05em;
      white-space: nowrap;
      pointer-events: none;
    }

    #ticker-container {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    .ticker-row {
      position: absolute;
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
    }

    .ticker-content {
      display: inline-block;
      animation: scroll-left linear infinite;
    }

    #checker-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 110;
      pointer-events: none;
    }

    @keyframes scroll-left {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>
<body>

  <div id="wip-container">
    <a id="wip-link" href="https://instagram.com/wip_pit" target="_blank" rel="noopener">WIP<span id="instagram-label">(INSTAGRAM)</span></a>
  </div>
  <div id="email-label">EMAIL</div>
  <div id="ticker-container"></div>
  <canvas id="checker-overlay"></canvas>

  <script>
    window.addEventListener('load', () => {
      const container = document.getElementById('ticker-container');
      const vw = window.innerWidth;

      const row1FontPx = Math.max(12, vw * 0.022);
      const row2FontPx = Math.max(16, vw * 0.030);

      const row1LinePx = row1FontPx * 2.0;
      const row2LinePx = row2FontPx * 2.0;

      const innerGap = row2FontPx * 2.25;

      const outerGap = row2LinePx * 3.0 - row2FontPx * 1.75;

      const rowDefs = [
        {
          cls: 'row1',
          text: 'MARK FROMOW',
          fontPx: row1FontPx,
          linePx: row1LinePx,
          fontFamily: "'Avenir Next Medium', sans-serif",
          fontWeight: '500',
          wordGap: '20ch',
          duration: 140,
        },
        {
          cls: 'row2',
          text: 'FASHION DESIGN SERVICES \u2022 SERVICES DE CR\u00C9ATION DE MODE',
          fontPx: row2FontPx,
          linePx: row2LinePx,
          fontFamily: "'Avenir Next', sans-serif",
          fontWeight: '400',
          wordGap: '3ch',
          duration: 105,
        },
      ];

      rowDefs[0].topPx = 0;
      rowDefs[1].topPx = row1LinePx + innerGap;
      const cycleHeightPx = rowDefs[1].topPx + row2LinePx + outerGap;

      function buildSet(yOffsetPx) {
        rowDefs.forEach(def => {
          const row = document.createElement('div');
          row.className = `ticker-row ${def.cls}`;
          row.style.cssText = `
            top: ${def.topPx + yOffsetPx}px;
            font-size: ${def.fontPx}px;
            line-height: ${def.linePx}px;
            font-family: ${def.fontFamily};
            font-weight: ${def.fontWeight};
          `;
          const content = document.createElement('div');
          content.className = 'ticker-content';
          content.style.animationDuration = `${def.duration}s`;
          const span = document.createElement('span');
          span.style.paddingRight = def.wordGap;
          span.textContent = def.text;
          content.appendChild(span);
          row.appendChild(content);
          container.appendChild(row);
          while (content.scrollWidth < vw * 2) {
            const s = document.createElement('span');
            s.style.paddingRight = def.wordGap;
            s.textContent = def.text;
            content.appendChild(s);
          }
          content.innerHTML += content.innerHTML;
        });
      }

      // Position WIP link just below the top — nudged down slightly from original
      document.getElementById('wip-container').style.top = `${row1LinePx * 0.6 + 10}px`;

      const sets = Math.ceil(window.innerHeight / cycleHeightPx) + 1;
      for (let i = 0; i < sets; i++) buildSet(i * cycleHeightPx);

      // Edge-to-edge checkerboard via canvas
      const canvas = document.getElementById('checker-overlay');
      const ctx = canvas.getContext('2d');
      const SQ = 170;
      let checkerVisible = false;
      let emailSquare = null;

      function drawChecker() {
        const W = window.innerWidth;
        const H = window.innerHeight;
        canvas.width  = W;
        canvas.height = H;

        ctx.clearRect(0, 0, W, H);

        const cols = Math.ceil(W / SQ) + 1;
        const rows = Math.ceil(H / SQ) + 1;

        // Pick a square near the centre for the email link
        const linkCol = Math.floor(cols / 2) % 2 === 0 ? Math.floor(cols / 2) : Math.floor(cols / 2) + 1;
        const linkRow = Math.floor(rows / 2) % 2 === 0 ? Math.floor(rows / 2) : Math.floor(rows / 2) + 1;
        // Ensure it falls on a black square position
        const adjLinkCol = (linkRow + linkCol) % 2 === 0 ? linkCol : linkCol + 1;

        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            if ((r + c) % 2 !== 0) continue;
            // Skip the email square — it will be an <a> element instead
            if (r === linkRow && c === adjLinkCol) continue;
            const x = c * SQ;
            const y = r * SQ;
            ctx.fillStyle = '#000';
            ctx.fillRect(x, y, SQ, SQ);
            ctx.fillStyle = '#fff';
            ctx.font = '8pt Courier, monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('MARK@MARKFROMOW.com', x + SQ / 2, y + SQ / 2);
          }
        }

        // Create the blue email hyperlink square
        emailSquare = document.createElement('a');
        emailSquare.href = 'mailto:MARK@MARKFROMOW.COM';
        emailSquare.style.cssText = `
          position: fixed;
          left: ${adjLinkCol * SQ}px;
          top: ${linkRow * SQ}px;
          width: ${SQ}px;
          height: ${SQ}px;
          background: #0000EE;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: Courier, monospace;
          font-size: 8pt;
          color: #fff;
          text-align: center;
          text-decoration: none;
          z-index: 120;
          box-sizing: border-box;
          padding: 8px;
          line-height: 1.3;
          word-break: break-all;
        `;
        emailSquare.textContent = 'MARK@MARKFROMOW.COM';
        document.body.appendChild(emailSquare);
      }

      document.body.addEventListener('click', (e) => {
        if (e.target.closest('#wip-link')) return;
        if (e.target.closest('a[href^="mailto"]')) return;
        checkerVisible = !checkerVisible;
        if (checkerVisible) {
          drawChecker();
          canvas.style.display = 'block';
        } else {
          canvas.style.display = 'none';
          if (emailSquare) { emailSquare.remove(); emailSquare = null; }
        }
      });
    });
  </script>
</body>
</html>
